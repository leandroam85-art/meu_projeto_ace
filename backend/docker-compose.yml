version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: endemias_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=sistema_endemias
      - POSTGRES_USER=admin_saude
      - POSTGRES_PASSWORD=senha_super_segura

  web:
    build: .
    container_name: endemias_web
    restart: always
    command: bash -c "cd src && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./src:/app/src
    environment:
      - DEBUG=True
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: endemias_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./src:/app/src
    depends_on:
      - web

volumes:
  postgres_data: